services:
  bot:
    build: ./bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      - landing

  landing:
    build: ./landing
    restart: unless-stopped
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.landing.rule=Host(`conference.yourdomain.com`)"
